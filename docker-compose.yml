version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: talentmail
      POSTGRES_USER: talentmail
      POSTGRES_PASSWORD: talentmail
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3456:8080"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - API_PORT=8080
      - DATABASE_URL=postgres://talentmail:talentmail@postgres:5432/talentmail

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
